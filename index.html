<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>多肽分子量计算器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>多肽分子量计算器</h1>
    <p>输入多肽的单字母氨基酸序列，选择质量类型并可添加修饰。</p>

    <label for="seq">序列（支持空格、换行，将自动忽略）：</label>
    <textarea id="seq" rows="4" placeholder="例如：ACDEFGHIKLMNPQRSTVWY"></textarea>

    <div class="controls">
      <button id="calc">计算分子量</button>
      <button id="clear">清空</button>
    </div>

    <div class="options">
      <label for="massType">质量类型：</label>
      <select id="massType">
        <option value="average">平均质量 (Average)</option>
        <option value="monoisotopic">单同位素质量 (Monoisotopic)</option>
      </select>

      <label for="presetMod">常见修饰基团：</label>
      <select id="presetMod">
        <option value="">选择常见修饰</option>
        <option value="M:15.9949">氧化 (Oxidation) - M +15.9949</option>
        <option value="C:57.02146">羧基化 (Carbamidomethyl) - C +57.02146</option>
        <option value="K:42.0106">乙酰化 (Acetylation) - K +42.0106</option>
        <option value="S:79.9663">磷酸化 (Phosphorylation) - S +79.9663</option>
        <option value="T:79.9663">磷酸化 (Phosphorylation) - T +79.9663</option>
        <option value="Y:79.9663">磷酸化 (Phosphorylation) - Y +79.9663</option>
        <option value="NTERM:42.0106">N端乙酰化 (N-term Acetylation) - NTERM +42.0106</option>
        <option value="CTERM:-0.98402">C端酰胺化 (C-term Amidation) - CTERM -0.98402</option>
      </select>

      <label for="presetPos">修饰位置：</label>
      <select id="presetPos">
        <option value="all">所有匹配残基</option>
        <option value="NTERM">N端</option>
        <option value="CTERM">C端</option>
        <option value="position">指定位置</option>
      </select>

      <div id="presetPosContainer" class="hidden">
        <label for="presetPosNum">位置编号：</label>
        <input id="presetPosNum" type="number" min="1" placeholder="1" />
      </div>

      <button id="addPresetMod" type="button">添加预设修饰</button>
      <p class="hint">从上方选择常见修饰基团并指定应用位置，或直接在下方输入手动修饰字符串。</p>

      <label for="mods">手动修饰输入（可选，格式示例：M=15.9949,C=57.02146,NTERM=42.0106）：</label>
      <input id="mods" placeholder="示例：M=15.9949,M3=15.99,NTERM=42.01,CTERM=-17.02" />
    </div>

    <section id="result" class="hidden">
      <h2>计算结果</h2>
      <p id="massSummary"></p>
      <table id="composition">
        <thead><tr><th>氨基酸</th><th>数量</th></tr></thead>
        <tbody></tbody>
      </table>
      <div id="errors" class="errors"></div>
    </section>

    <section class="notes">
      <h3>说明</h3>
      <ul>
        <li>支持 20 种标准氨基酸的平均/单同位素质量。计算公式：自由氨基酸质量之和 - (残基数-1) × 水分子质量 + 端修饰。</li>
        <li>修饰格式示例：<code>M=15.9949</code> 表示对所有 M 残基加上 +15.9949 Da；支持常见修饰选择并指定 <code>NTERM</code>/<code>CTERM</code> 或具体位置。</li>
      </ul>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
